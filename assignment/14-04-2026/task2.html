<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task 2 – GET Request &amp; JSON Display</title>
  <style>
    body  { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    h2    { color: #333; }
    table { border-collapse: collapse; width: 100%; background: #fff; }
    th    { background: #4a90d9; color: #fff; padding: 10px; text-align: left; }
    td    { padding: 9px 10px; border-bottom: 1px solid #ddd; }
    tr:hover td { background: #f0f7ff; }
    #status { color: #888; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h2>Task 2 – GET Request: JSONPlaceholder Users</h2>
  <p id="status">Fetching data from https://jsonplaceholder.typicode.com/users ...</p>

  <table>
    <thead>
      <tr><th>ID</th><th>Name</th><th>Email</th><th>City</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    fetch("https://jsonplaceholder.typicode.com/users")
      .then(res => res.json())
      .then(users => {
        document.getElementById("status").textContent =
          `Loaded ${users.length} users from API.`;

        const tbody = document.getElementById("tbody");
        users.forEach(u => {
          const row = `<tr>
            <td>${u.id}</td>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td>${u.address.city}</td>
          </tr>`;
          tbody.insertAdjacentHTML("beforeend", row);
        });
      })
      .catch(err => {
        document.getElementById("status").textContent = "Error: " + err.message;
      });
  </script>
</body>
</html>
